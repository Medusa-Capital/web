name: Scheduled Deploy

on:
  schedule:
    - cron: '0 8 * * *' # Daily at 8 AM UTC
  workflow_dispatch: # Manual trigger from GitHub Actions UI

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel Deploy
        run: curl -s -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
